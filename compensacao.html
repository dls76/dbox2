<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compensação ADM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #4F6EF7;
            --accent-light: #EEF1FE;
            --accent-hover: #3a57e8;
            --surface: #ffffff;
            --bg: #F4F6FB;
            --border: #E8EAF0;
            --text-primary: #1A1D2E;
            --text-secondary: #7B7F96;
            --text-muted: #B0B4C8;
            --tag-blue: #4F6EF7;
            --tag-orange: #FF9052;
            --tag-purple: #9B72F7;
            --tag-teal: #34C9C9;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(26,29,46,0.06), 0 1px 2px rgba(26,29,46,0.04);
            --shadow-md: 0 4px 16px rgba(26,29,46,0.08), 0 1px 4px rgba(26,29,46,0.04);
            --shadow-lg: 0 8px 32px rgba(26,29,46,0.10), 0 2px 8px rgba(26,29,46,0.06);
        }

        body {
            background-color: var(--bg);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            height: 64px;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-dot {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-dot svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .app-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* Nav central */
        .header-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--accent);
            border-radius: var(--radius-sm);
            width: 34px;
            height: 34px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.18s ease;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(79,110,247,0.28);
            transform: translateY(-1px);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .btn-hoje {
            width: auto;
            padding: 0 14px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .btn-hoje.ativo {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-hoje.ativo:hover {
            background: var(--accent);
            color: white;
        }

        .header-title-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            min-width: 0;
        }

        .header-label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .header-period {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .badge-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .badge-pill span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        /* ── MAIN ── */
        main {
            width: 88%;
            max-width: 1400px;
            margin: 36px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── SECTION HEADER ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .section-sub {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ── TABLE CARD ── */
        .table-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Cabeçalho da tabela */
        thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 14px 18px;
            text-align: center;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            width: 16.66%;
        }

        th:first-child {
            width: 10%;
            text-align: left;
            padding-left: 22px;
        }

        /* Células */
        tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #FAFBFE;
        }

        td {
            padding: 20px 18px;
            text-align: center;
            vertical-align: top;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        td:first-child {
            text-align: left;
            padding-left: 22px;
            vertical-align: middle;
        }

        /* Período label (Manhã / Tarde) */
        .periodo-label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        .periodo-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .periodo-icon.manha {
            background: #FFF7E6;
        }

        .periodo-icon.tarde {
            background: #EEF1FE;
        }

        /* Tags de nomes */
        .nome-funcionario {
            display: inline-flex;
            align-items: center;
            margin: 3px 4px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            white-space: nowrap;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .nome-funcionario:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.10);
        }

        /* Variações de cor cicladas */
        .color-0 { background: rgba(79,110,247,0.12); color: #3a57e8; }
        .color-1 { background: rgba(255,144,82,0.14); color: #d9652a; }
        .color-2 { background: rgba(52,201,201,0.14); color: #1a9f9f; }
        .color-3 { background: rgba(155,114,247,0.14); color: #7048d4; }
        .color-4 { background: rgba(79,110,247,0.08); color: #4F6EF7; }

        /* Célula vazia */
        .empty {
            position: relative;
        }

        .empty::after {
            content: '—';
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Linha divisória entre manhã/tarde */
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ── OBS CARD ── */
        .obs-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .obs-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 22px 16px;
            border-bottom: 1px solid var(--border);
        }

        .obs-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-light);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .obs-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .obs-body {
            padding: 16px 22px 20px;
        }

        .obs-texto {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.75;
        }

        .obs-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.84rem;
            color: var(--text-primary);
        }

        .obs-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .obs-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            height: 72px;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            main { width: 95%; }
            .header-label { display: none; }
            .badge-pill { display: none; }
            .app-name { display: none; }
        }

        @media (max-width: 640px) {
            header { padding: 0 16px; }
            main { margin: 20px auto; gap: 14px; }
            .btn-hoje { display: none; }
            th, td { padding: 12px 8px; font-size: 0.75rem; }
            td:first-child { padding-left: 12px; }
            th:first-child { padding-left: 12px; }
            .nome-funcionario { padding: 4px 9px; font-size: 0.72rem; margin: 2px; }
            .section-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <!-- Logo -->
            <div class="header-left">
                <div class="logo-dot">
                    <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1.5"/><rect x="9" y="2" width="5" height="5" rx="1.5"/><rect x="2" y="9" width="5" height="5" rx="1.5"/><rect x="9" y="9" width="5" height="5" rx="1.5"/></svg>
                </div>
                <span class="app-name">Compensação ADM</span>
            </div>

            <!-- Navegação central -->
            <div class="header-nav">
                <button class="nav-btn" id="btnAnterior" title="Semana anterior">&#8592;</button>
                <div class="header-title-wrap">
                    <span class="header-label">Semana em exibição</span>
                    <span class="header-period" id="titulo">—</span>
                </div>
                <button class="nav-btn btn-hoje" id="btnHoje" title="Semana atual">Hoje</button>
                <button class="nav-btn" id="btnProximo" title="Próxima semana">&#8594;</button>
            </div>

            <!-- Badge direita -->
            <div class="header-right">
                <div class="badge-pill">
                    <span></span>
                    Escala Ativa
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Cabeçalho da seção -->
        <div class="section-header">
            <div>
                <div class="section-title">Escala de Compensação</div>
                <div class="section-sub">Visualização semanal — Manhã &amp; Tarde</div>
            </div>
        </div>

        <!-- Tabela -->
        <div class="table-card">
            <table id="tabelaCompensacao">
                <thead>
                    <tr>
                        <th></th>
                        <th>Segunda</th>
                        <th>Terça</th>
                        <th>Quarta</th>
                        <th>Quinta</th>
                        <th>Sexta</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <!-- Observações -->
        <div class="obs-card">
            <div class="obs-header">
                <div class="obs-icon">📋</div>
                <span class="obs-title">Alterações da Semana</span>
            </div>
            <div class="obs-body">
                <div id="textoObservacoes" class="obs-texto">Escala sem alterações</div>
            </div>
        </div>
    </main>

    <footer>
        <span class="footer-text">Compensação ADM &mdash; Sistema de Escalas</span>
    </footer>

    <script type="module">
    import {
        getColorClass,
        getEscalaSemana,
        getPeriodoSemana
    } from './compensacao-data.js';

    // ─── Estado ───────────────────────────────────────────────────────────────
    let offsetSemanas = 0;

    // ─── Render ───────────────────────────────────────────────────────────────
    function atualizarTitulo() {
        document.getElementById('titulo').textContent = getPeriodoSemana(offsetSemanas);
    }

    function atualizarBotaoHoje() {
        document.getElementById('btnHoje').classList.toggle('ativo', offsetSemanas === 0);
    }

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        const { escala } = getEscalaSemana(offsetSemanas);

        const periodos = [
            { nome: 'Manhã', chave: 'manha', iconClass: 'manha', emoji: '🌤️' },
            { nome: 'Tarde', chave: 'tarde', iconClass: 'tarde', emoji: '🌆' }
        ];
        const dias = ['SEG', 'TER', 'QUA', 'QUI', 'SEX'];

        periodos.forEach(periodo => {
            const linha = document.createElement('tr');

            const celulaPeriodo = document.createElement('td');
            celulaPeriodo.innerHTML = `
                <span class="periodo-label">
                    <span class="periodo-icon ${periodo.iconClass}">${periodo.emoji}</span>
                    ${periodo.nome}
                </span>`;
            linha.appendChild(celulaPeriodo);

            dias.forEach(dia => {
                const celula = document.createElement('td');
                const funcionarios = escala[periodo.chave][dia];

                if (funcionarios && funcionarios.length > 0) {
                    funcionarios.forEach(func => {
                        const span = document.createElement('span');
                        span.className = `nome-funcionario ${getColorClass(func)}`;
                        span.textContent = func;
                        celula.appendChild(span);
                    });
                } else {
                    celula.classList.add('empty');
                }

                linha.appendChild(celula);
            });

            corpo.appendChild(linha);
        });
    }

    function renderizarObservacoes() {
        const textoObs = document.getElementById('textoObservacoes');
        const { isEspecial, observacoes } = getEscalaSemana(offsetSemanas);

        if (!isEspecial || observacoes.length === 0) {
            textoObs.innerHTML = '<span class="obs-texto">Nenhuma alteração registrada para esta semana.</span>';
            return;
        }

        textoObs.innerHTML = observacoes.map((obs, i) => `
            <div class="obs-item">
                <span class="obs-num">${i + 1}</span>
                <span>${obs}</span>
            </div>`
        ).join('');
    }

    function renderizar() {
        atualizarTitulo();
        atualizarBotaoHoje();
        renderizarTabela();
        renderizarObservacoes();
    }

    // ─── Eventos ──────────────────────────────────────────────────────────────
    document.getElementById('btnAnterior').addEventListener('click', () => { offsetSemanas--; renderizar(); });
    document.getElementById('btnProximo').addEventListener('click', () => { offsetSemanas++; renderizar(); });
    document.getElementById('btnHoje').addEventListener('click', () => { offsetSemanas = 0; renderizar(); });

    document.addEventListener('DOMContentLoaded', renderizar);
</script>

</body>
</html>
