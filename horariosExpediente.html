<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horários de Trabalho CAC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 30px 16px 60px;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .header p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    /* ── RELÓGIO ──────────────────────────────────────────── */
    .clock {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(99,179,237,0.6);
      font-variant-numeric: tabular-nums;
    }

    /* ── LEGENDA ──────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-working { background: #00e676; }
    .dot-break   { background: #ffd740; }
    .dot-off     { background: rgba(255,255,255,0.2); }

    /* ── TABS ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      border: none;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
    }

    .tab-btn.active {
      background: #63b3ed;
      color: #0f3460;
      border-color: #63b3ed;
      box-shadow: 0 4px 18px rgba(99,179,237,0.4);
    }

    /* ── SEÇÕES ───────────────────────────────────────────── */
    .section {
      display: none;
      max-width: 860px;
      margin: 0 auto;
    }

    .section.active { display: block; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .section-title span {
      font-size: 1.4rem;
    }

    /* ── TABLE CONTAINER ──────────────────────────────────── */
    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    /* ── TABELA ───────────────────────────────────────────── */
    table {
      width: 100%;
      min-width: 320px;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ── THEAD ────────────────────────────────────────────── */
    thead tr {
      background: rgba(255,255,255,0.08);
    }

    th {
      padding: 16px 18px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
      color: #63b3ed;
      transition: color 0.2s;
    }

    th.sortable:hover { color: #90cdf4; }

    .sort-icon {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    /* ── TBODY ────────────────────────────────────────────── */
    td {
      padding: 14px 18px;
      font-size: 0.93rem;
      font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      transition: background 0.3s;
    }

    td:first-child {
      font-weight: 700;
      color: #fff;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: filter 0.2s; }
    tbody tr:hover { filter: brightness(1.15); }

    /* STATUS */
    tbody tr.status-working {
      background: linear-gradient(90deg, rgba(0,230,118,0.18) 0%, rgba(0,230,118,0.07) 100%);
    }
    tbody tr.status-working td:first-child {
      border-left: 3px solid #00e676;
      color: #69f0ae;
    }

    tbody tr.status-break {
      background: linear-gradient(90deg, rgba(255,215,64,0.20) 0%, rgba(255,215,64,0.07) 100%);
    }
    tbody tr.status-break td:first-child {
      border-left: 3px solid #ffd740;
      color: #ffe57f;
    }

    tbody tr.status-off td:first-child {
      border-left: 3px solid rgba(255,255,255,0.15);
    }

    /* BADGE */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .badge-working {
      background: rgba(0,230,118,0.2);
      color: #00e676;
      border: 1px solid rgba(0,230,118,0.4);
    }

    .badge-break {
      background: rgba(255,215,64,0.2);
      color: #ffd740;
      border: 1px solid rgba(255,215,64,0.4);
    }

    .badge-off {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── RESPONSIVO ───────────────────────────────────────── */
    @media (min-width: 600px) {
      body { padding: 50px 24px 80px; }
      .header h1 { font-size: 2.4rem; }
      th, td { padding: 16px 22px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Horários de Trabalho - 2026</h1>
    <!-- <p>Atualizado automaticamente em tempo real</p> -->
    <!-- <div class="clock" id="clock">00:00:00</div> -->
  </div>


  <!-- <div class="legend">
    <div class="legend-item">
      <span class="legend-dot dot-working"></span> Trabalhando
    </div>
    <div class="legend-item">
      <span class="legend-dot dot-break"></span> Em intervalo
    </div>
    <div class="legend-item">
      <span class="legend-dot dot-off"></span> Fora do horário
    </div>
  </div> -->

  <!-- Tabs e seções geradas pelo JS -->
  <div class="tabs" id="tabs"></div>
  <div id="sections"></div>

  <script type="module">
    import { setores } from './horariosExpedienteData.js';

    // ── Utilidades ────────────────────────────────────────
    const clockEl    = document.getElementById('clock');
    const tabsEl     = document.getElementById('tabs');
    const sectionsEl = document.getElementById('sections');

    function toMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function getStatus(item) {
      const now  = new Date();
      const cur  = now.getHours() * 60 + now.getMinutes();
      const ent  = toMin(item.entrada);
      const intv = toMin(item.intervalo);
      const ret  = toMin(item.retorno);
      const sai  = toMin(item.saida);
      if (cur >= ent  && cur < intv) return 'working';
      if (cur >= intv && cur < ret)  return 'break';
      if (cur >= ret  && cur < sai)  return 'working';
      return 'off';
    }

    const statusConfig = {
      working: { label: '● Trabalhando', badgeClass: 'badge-working', rowClass: 'status-working' },
      break:   { label: '● Intervalo',   badgeClass: 'badge-break',   rowClass: 'status-break'   },
      off:     { label: '● Fora',        badgeClass: 'badge-off',     rowClass: 'status-off'     },
    };

    // ── Estado de ordenação por setor ─────────────────────
    // Guarda: null | 'asc' | 'desc'  por setor id
    const sortState    = {};
    const originalData = {};

    setores.forEach(s => {
      sortState[s.id]    = null;
      originalData[s.id] = [...s.colaboradores];
    });

    // ── Renderiza tbody de um setor ───────────────────────
    function renderTbody(setor) {
      const tbody = document.getElementById(`tbody-${setor.id}`);
      tbody.innerHTML = '';
      setor.colaboradores.forEach(item => {
        const status = getStatus(item);
        const cfg    = statusConfig[status];
        const tr     = document.createElement('tr');
        tr.className = cfg.rowClass;
        tr.innerHTML = `
          <td>${item.nome}</td>
          <td>${item.entrada}</td>
          <td>${item.intervalo}</td>
          <td>${item.retorno}</td>
          <td>${item.saida}</td>
          <td><span class="badge ${cfg.badgeClass}">${cfg.label}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ── Ordenação 3 estados ───────────────────────────────
    function sortSetor(setor) {
      const state = sortState[setor.id];
      const icon  = document.getElementById(`sort-icon-${setor.id}`);

      if (state === null) {
        setor.colaboradores.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
        sortState[setor.id] = 'asc';
        icon.textContent = '↑';
      } else if (state === 'asc') {
        setor.colaboradores.sort((a, b) => b.nome.localeCompare(a.nome, 'pt-BR'));
        sortState[setor.id] = 'desc';
        icon.textContent = '↓';
      } else {
        setor.colaboradores.length = 0;
        originalData[setor.id].forEach(i => setor.colaboradores.push(i));
        sortState[setor.id] = null;
        icon.textContent = '↕';
      }
      renderTbody(setor);
    }

    // ── Tabs ──────────────────────────────────────────────
    function activateTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === id)
      );
      document.querySelectorAll('.section').forEach(s =>
        s.classList.toggle('active', s.id === `section-${id}`)
      );
    }

    // ── Gera tabs + seções dinamicamente ─────────────────
    setores.forEach((setor, idx) => {
      // Tab button
      const btn = document.createElement('button');
      btn.className  = 'tab-btn' + (idx === 0 ? ' active' : '');
      btn.dataset.tab = setor.id;
      btn.innerHTML  = `<span>${setor.icon}</span>${setor.label}`;
      btn.addEventListener('click', () => activateTab(setor.id));
      tabsEl.appendChild(btn);

      // Section
      const section = document.createElement('div');
      section.className = 'section' + (idx === 0 ? ' active' : '');
      section.id        = `section-${setor.id}`;
      section.innerHTML = `
        <!--<div class="section-title">
          <span>${setor.icon}</span> ${setor.label}
        </div>-->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th class="sortable" id="th-${setor.id}">
                  Nome <span class="sort-icon" id="sort-icon-${setor.id}">↕</span>
                </th>
                <th>Entrada</th>
                <th>Intervalo</th>
                <th>Retorno</th>
                <th>Saída</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tbody-${setor.id}"></tbody>
          </table>
        </div>
      `;
      sectionsEl.appendChild(section);

      // Listener de ordenação
      section.querySelector(`#th-${setor.id}`)
        .addEventListener('click', () => sortSetor(setor));

      // Primeira renderização
      renderTbody(setor);
    });

    // ── Relógio ───────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const hh  = String(now.getHours()).padStart(2, '0');
      const mm  = String(now.getMinutes()).padStart(2, '0');
      const ss  = String(now.getSeconds()).padStart(2, '0');
      clockEl.textContent = `${hh}:${mm}:${ss}`;
    }

    // ── Atualiza status no :00 de cada minuto ─────────────
    function scheduleStatusUpdate() {
      const ms = (60 - new Date().getSeconds()) * 1000;
      setTimeout(() => {
        setores.forEach(s => renderTbody(s));
        scheduleStatusUpdate();
      }, ms);
    }

    updateClock();
    setInterval(updateClock, 1000);
    scheduleStatusUpdate();
  </script>

</body>
</html>
